workflows:
  debug-apk:
    name: Debug APK Build
    max_build_duration: 120
    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=512m"
    scripts:
      - name: Check Gradle configuration
        script: |
          chmod +x ./gradlew
          ./gradlew --version
      
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug --no-daemon --build-cache --parallel
    
    artifacts:
      - app/build/outputs/apk/debug/**/*.apk

  release-apk:
    name: Release APK Build
    max_build_duration: 120
    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=512m"
    scripts:
      - name: Check Gradle configuration
        script: |
          chmod +x ./gradlew
          ./gradlew --version
      
      - name: Build Release APK
        script: |
          ./gradlew assembleRelease --no-daemon --build-cache --parallel
    
    artifacts:
      - app/build/outputs/apk/release/**/*.apk
