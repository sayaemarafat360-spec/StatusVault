workflows:
  # Debug Workflow
  SnapVault-Debug:
    name: SnapVault Debug
    max_build_duration: 30
    environment:
      java: 17
      groups:
        - google_play
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug
      
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # Release Workflow
  SnapVault-Release:
    name: SnapVault Release
    max_build_duration: 30
    environment:
      java: 17
      groups:
        - google_play
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      
      - name: Build Release APK
        script: |
          ./gradlew assembleRelease
      
    artifacts:
      - app/build/outputs/apk/release/*.apk
    
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
