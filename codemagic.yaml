workflows:
  debug-apk:
    name: Debug APK Build
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=512m"
    scripts:
      - name: Check Gradle configuration
        script: |
          ./gradlew --version
      
      - name: Build Debug APK
        script: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --build-cache --parallel
    
    artifacts:
      - app/build/outputs/apk/debug/**/*.apk
    
    publishing:
      email:
        recipients:
          - $GMAIL_ADDRESS
        notify:
          success: true
          failure: true

  release-apk:
    name: Release APK Build
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=512m"
    scripts:
      - name: Check Gradle configuration
        script: |
          ./gradlew --version
      
      - name: Build Release APK (Unsigned)
        script: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --build-cache --parallel
    
    artifacts:
      - app/build/outputs/apk/release/**/*.apk
    
    publishing:
      email:
        recipients:
          - $GMAIL_ADDRESS
        notify:
          success: true
          failure: true
